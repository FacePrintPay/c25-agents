<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Constellation25 | Sovereign Command</title>
    <style>
        :root { --bg: #050505; --text: #e0e0e0; --accent: #00ff41; --card: #111; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 0; }
        
        /* TOP PROMPT BAR */
        #top-prompt-bar { background: #000; border-bottom: 2px solid var(--accent); padding: 20px; position: sticky; top: 0; z-index: 1000; display: flex; gap: 10px; align-items: center; box-shadow: 0 5px 20px rgba(0,255,65,0.2); }
        #top-prompt-bar input { flex: 1; background: #111; border: 1px solid var(--accent); color: var(--accent); padding: 15px; font-family: inherit; font-size: 1.1rem; outline: none; }
        #top-prompt-bar button { background: var(--accent); color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: inherit; }
        #top-prompt-bar button:hover { background: #fff; }
        
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        .status { color: var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        nav { background: #111; display: flex; overflow-x: auto; }
        nav button { background: transparent; color: #888; border: none; padding: 15px 25px; cursor: pointer; font-family: inherit; }
        nav button.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: #1a1a1a; }
        
        main { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .section { display: none; animation: fadeIn 0.5s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; }
        .card h3 { color: var(--accent); margin-top: 0; }
        .meta { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
        
        #live-response { position: fixed; bottom: 20px; right: 20px; background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 15px; max-width: 400px; display: none; z-index: 2000; box-shadow: 0 0 20px rgba(0,255,65,0.5); }
    </style>
</head>
<body>

<!-- TOP PROMPT BOX -->
<div id="top-prompt-bar">
    <span style="color:var(--accent); font-weight:bold;">CMD ></span>
    <input type="text" id="global-prompt" placeholder="Command any agent immediately..." onkeydown="if(event.key==='Enter') sendGlobalPrompt()">
    <button onclick="sendGlobalPrompt()">EXECUTE</button>
</div>

<header>
    <div class="logo">CONSTELLATION25 | LOCAL NODE</div>
    <div class="status">● OLLAMA CONNECTED • DB ACTIVE</div>
</header>

<nav>
    <button class="active" onclick="show('dashboard')">Dashboard</button>
    <button onclick="show('agents')">Agents</button>
    <button onclick="show('modules')">Modules</button>
    <button onclick="show('logs')">Logs</button>
</nav>

<main>
    <div id="dashboard" class="section active">
        <h2 style="color:var(--accent)">System Overview</h2>
        <div class="grid">
            <div class="card"><h3>Backend</h3><p>FastAPI (Local)</p></div>
            <div class="card"><h3>AI Engine</h3><p>Qwen via Ollama</p></div>
            <div class="card"><h3>Database</h3><p>SQLite (Persistent)</p></div>
        </div>
    </div>
    
    <div id="agents" class="section">
        <h2 style="color:var(--accent)">Planetary Agents</h2>
        <div class="grid" id="agent-grid"></div>
    </div>
    
    <div id="modules" class="section">
        <h2 style="color:var(--accent)">Sovereign Modules</h2>
        <div class="grid" id="module-grid"></div>
    </div>
    
    <div id="logs" class="section">
        <h2 style="color:var(--accent)">Execution Logs</h2>
        <div id="log-list" style="background:#111; padding:10px; max-height:500px; overflow-y:auto;"></div>
    </div>
</main>

<div id="live-response"></div>

<script>
    function show(id) {
        document.querySelectorAll('.section').forEach(d => d.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
        if(id === 'agents') loadAgents();
        if(id === 'modules') loadModules();
        if(id === 'logs') loadLogs();
    }

    async function sendGlobalPrompt() {
        const input = document.getElementById('global-prompt');
        const txt = input.value;
        if(!txt) return;
        
        const respBox = document.getElementById('live-response');
        respBox.style.display = 'block';
        respBox.innerText = "Processing via Local Qwen...";
        
        try {
            const res = await fetch('/api/v1/prompt', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt: txt, agent_name: "Swarm" })
            });
            const data = await res.json();
            respBox.innerText = data.response;
            input.value = "";
            setTimeout(() => { respBox.style.display = 'none'; }, 5000);
        } catch(e) {
            respBox.innerText = "Error: Is Backend Running?";
        }
    }

    async function loadAgents() {
        const grid = document.getElementById('agent-grid');
        if(grid.children.length > 0) return;
        const res = await fetch('/api/v1/agents');
        const agents = await res.json();
        agents.forEach(a => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<h3>${a.name}</h3><div class="meta">Role: ${a.role}</div><div class="meta">Status: ${a.status}</div>`;
            grid.appendChild(div);
        });
    }

    async function loadModules() {
        const grid = document.getElementById('module-grid');
        if(grid.children.length > 0) return;
        const res = await fetch('/api/v1/modules');
        const mods = await res.json();
        mods.forEach(m => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<h3>${m.name}</h3><div class="meta">Price: $${m.price}</div><div class="meta">Status: ${m.status}</div>`;
            grid.appendChild(div);
        });
    }

    async function loadLogs() {
        const list = document.getElementById('log-list');
        if(list.children.length > 0) return;
        const res = await fetch('/api/v1/logs');
        const logs = await res.json();
        logs.forEach(l => {
            const div = document.createElement('div');
            div.style.padding = "10px";
            div.style.borderBottom = "1px solid #333";
            div.innerHTML = `<span style="color:#888">[${l.timestamp}]</span> <b>${l.agent_name}</b>: ${l.prompt}<br><span style="color:var(--accent)">>> ${l.response}</span>`;
            list.appendChild(div);
        });
    }
</script>
</body>
</html>
